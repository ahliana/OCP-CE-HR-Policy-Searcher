# ---------------------------------------------------------------------------
# NEEDS HUMAN ISO LOOKUP (1) - do not guess these, per task instructions
# ---------------------------------------------------------------------------
#
# - kosovo (used by longtail-countries.md candidate #13, Ministry of Economy
#   / me.rks-gov.net): ISO 3166-1 has NOT assigned Kosovo an official code -
#   its status is contested (recognized by ~100 UN member states, not by
#   Serbia/Russia/China/Spain among others). Commonly used UNOFFICIAL
#   workarounds seen in other datasets: alpha-3 "XKX" (used by Eurostat,
#   SWIFT, the World Bank) and, inconsistently, numeric "983" (not an
#   official ISO_3166-1 numeric assignment - some GIS/world-atlas datasets
#   use it, others use no numeric key at all / render Kosovo as a
#   non-mapped territory). The longtail-countries.md research file itself
#   raised the exact same political-sensitivity flag for a DIFFERENT,
#   unrelated entity (Northern Cyprus/TRNC, listed there as unverified) and
#   recommended a human decide how to represent contested territories before
#   any crawl config is written. Same recommendation applies here: a human
#   should decide (a) whether to map Kosovo at all given the world-atlas
#   join constraint, (b) which unofficial code to use if so, and (c) how the
#   existing `serbia`-adjacent entries (if any) should relate. Not guessed
#   here per the task's explicit instruction.
