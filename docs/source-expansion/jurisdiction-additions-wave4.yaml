# Proposed jurisdiction-registry additions - WAVE 4 (source-expansion research)
# ---------------------------------------------------------------------------
# Wave 4 drafted 94 verified candidates across 5 research files
# (docs/source-expansion/regions-wave4/*.md). This is the map-critical
# deliverable: every DISTINCT `region:` slug used by a wave-4 draft entry
# that is NOT already present in config/jurisdictions.yaml (checked against
# the full live registry, 1049 lines, read in full before drafting this).
#
# 63 new distinct jurisdiction slugs total:
#   - 27 new COUNTRY rows (26 with confirmed ISO 3166-1 alpha-3 + numeric
#     codes; 1 - Kosovo - flagged under NEEDS HUMAN ISO LOOKUP, not guessed)
#   - 36 new SUBNATIONAL rows under 9 already-existing country parents
#     (Germany, Switzerland, Spain, Italy, Belgium, Australia, Canada, Japan,
#     India) plus 6 new subnational rows under the newly-added `china` row
#
# This file is APPEND-ONLY guidance for config/jurisdictions.yaml - per the
# task brief, config/jurisdictions.yaml itself is NOT edited from this
# docs-only branch (same convention as jurisdiction-additions.yaml from
# waves 1-3). A human/registry-owner merges these rows at promotion time.
#
# No usual "supranational"/"global"/"manitoba" gaps recur this wave (those
# were waves 1-3's gaps, already captured in jurisdiction-additions.yaml).
# ---------------------------------------------------------------------------

