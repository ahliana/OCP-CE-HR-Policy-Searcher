    category: "regulatory"
    tags:
      - "mandates"
      - "planning"
    policy_types:
      - "regulation"
      - "report"
    language: "en"
    verified_by: "source-expansion-research (us-states agent)"
    notes: |
      Append to config/domains/us/new_york.yaml.
      Feb 2026 NY PSC opened "Proceeding on ... Interconnection Reforms for
      Large Loads" (Gov. Hochul's Energize NY initiative) — 11.9GW in the
      NYISO queue as of Feb 2026; technical conference due Dec 2026, white
      paper due Feb 2027. new_york.yaml currently only has NYSERDA + state
      senate; the PSC/DPS itself is missing. Document viewer
      (documents.dps.ny.gov) serves PDFs behind a DocRefId GUID param — not
      directly browsable, needs the File Search step first; not
      independently text-extracted this pass (see INVENTORY appendix).
      verified: yes (site + case-search nav confirmed live; specific order
      text corroborated via secondary sources only, see appendix).

  - name: "Oregon Public Utility Commission — Large Customer / Data Center Tariffs"
    id: "or_puc_large_load"
    enabled: false
    base_url: "https://www.oregon.gov/puc"
    start_paths:
      - "/puc/utilities/pages/large-load.aspx"
    region:
      - "us"
      - "us_states"
      - "oregon"
    category: "regulatory"
    tags:
      - "mandates"
      - "incentives"
    policy_types:
      - "regulation"
    language: "en"
    verified_by: "source-expansion-research (us-states agent)"
    notes: |
      Append to config/domains/us/oregon.yaml.
      Implements OR's 2025 POWER Act (HB 3546). Docket UM 2377 (approved
      May 2026) created Schedule 96 for PGE data centers >20MW: 100% cost
      recovery, 90% min demand charges, 10-30yr terms, 1c/kWh surcharge on
      >100MW funding low-income energy-burden programs. Related dockets:
      UE 433, UE 463, UE 424, UM 2024. base_url shares the oregon.gov root
      with the existing or_building_codes entry (bare https://www.oregon.gov)
      — same multi-entry-per-root pattern already used for energy.ca.gov (6x
      in california.yaml). Order PDFs live on a separate
      apps.puc.state.or.us subdomain — may need its own
      allowed_path_patterns. verified: yes (live fetch).

