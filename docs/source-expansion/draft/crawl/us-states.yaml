      - "mandates"
    policy_types:
      - "regulation"
      - "guidance"
    language: "en"
    verified_by: "source-expansion-research (us-states agent)"
    notes: |
      Append to config/domains/us/virginia.yaml (locality section).
      Loudoun is the self-described "Data Center Capital of the World."
      Mar 2025 zoning amendment eliminated by-right DC development
      (special-exception review now required). Phase 2 page scopes review
      of "energy opportunities"/on-site generation; a linked county brief
      recommends waste-heat recapture (district energy) for nearby
      buildings. Category mapped to "regulatory" (permit/zoning authority,
      closest fit — no "local_government" category exists in
      VALID_CATEGORIES). Most concrete "local government considering
      DC waste-heat reuse" source found in the whole region.
      verified: yes (both URLs fetched live).

