# =============================================================================
# DRAFT — US States/Local source expansion (tier-b crawl domains only)
# Source: docs/source-expansion/regions/us-states.md
# Every entry below is `enabled: false`. These append to PER-STATE files under
# config/domains/us/ (one file per state already exists) — target file named
# in each entry's notes. mo_psc / mo_energy_division / ne_dwee REPLACE the
# current comment-only stub files for missouri.yaml / nebraska.yaml.
# No tier-a or tier-c candidates found for this region (see INVENTORY.md).
# Category/tags/policy_types validated against the live enum in
# src/core/config.py (VALID_CATEGORIES/VALID_TAGS/VALID_POLICY_TYPES), which
# is broader than the illustrative comment block in _template.yaml — see
# INVENTORY.md "Schema note" for why.
# =============================================================================

domains:
  - name: "Virginia State Corporation Commission (SCC) — Case Information / Docket Search"
    id: "va_scc"
    enabled: false
    base_url: "https://www.scc.virginia.gov"
    start_paths:
      - "/case-information/"
      - "/pages/Data-Centers"
    region:
      - "us"
      - "us_states"
      - "virginia"
    category: "regulatory"
    tags:
      - "mandates"
      - "reporting"
    policy_types:
      - "regulation"
      - "report"
    language: "en"
    verified_by: "source-expansion-research (us-states agent)"
    notes: |
      Append to config/domains/us/virginia.yaml.
      VA's PUC-equivalent. Nov 2025 approved a GS-5 rate class for data-center
      customers >=25MW (14-year contracts, 85%/60% minimum demand floors);
      as of Jul 2026 considering shifting transmission cost allocation onto
      data centers. Complements the HB323/HB906/HB824 bill-tracking entries
      already in virginia.yaml — SCC is the implementing body those bills name.
      Canonical URL redirects from http to a non-HTTPS-looking host; verify
      TLS behavior before enabling. verified: yes (live browser fetch,
      2026-07 pass).

  - name: "Georgia Public Service Commission — Data Center / Large-Load Rulemaking"
    id: "ga_psc"
    enabled: false
    base_url: "https://psc.ga.gov"
    start_paths:
      - "/"
      - "/site/downloads/datacenterfactsheet.pdf"
    region:
      - "us"
      - "us_states"
      - "georgia"
    category: "regulatory"
    tags:
      - "mandates"
      - "reporting"
    policy_types:
      - "regulation"
      - "report"
    language: "en"
    verified_by: "source-expansion-research (us-states agent)"
    notes: |
      Append to config/domains/us/georgia.yaml.
      Docket #44280 set a 100MW peak-demand large-load threshold (Feb 2025);
      Jul 2025 order froze Georgia Power base rates through 2028 + mandates
      quarterly large-load reports. georgia.yaml already tracks SB 34
      (cost-allocation law) but not the PSC that implements it.
      verified: yes (live fetch confirmed dedicated data-center homepage
      section referencing Docket #44280).

  - name: "Texas PUC Interchange — Large Load Interconnection Rulemaking (Project 58481)"
    id: "tx_puc_interchange"
    enabled: false
    base_url: "https://interchange.puc.texas.gov"
    start_paths:
      - "/Search/Filings?ControlNumber=58481"
    region:
      - "us"
      - "us_states"
      - "texas"
    category: "regulatory"
    tags:
      - "mandates"
      - "reporting"
    policy_types:
      - "regulation"
    language: "en"
    verified_by: "source-expansion-research (us-states agent)"
    notes: |
      Append to config/domains/us/texas.yaml.
      Implements TX SB6 (2025): PUCT large-load (>=75MW) interconnection
      standards for ERCOT, proposed rule 16 TAC Sec 25.194 (Mar 2026),
      $100k-300k study fees, $50k/MW financial security. Live docket, 203+
      filings as of verification. Query-string driven (?ControlNumber=) —
      crawler needs to target specific control numbers, periodic
      re-discovery required for new dockets. Old marketing site
      puc.texas.gov 404s post-redesign — do NOT use as base_url, use the
      Interchange subdomain above. verified: yes, via browser (WebFetch
      returned an anomalous 402 on this URL per the region researcher —
      treated as a WebFetch-tool artifact, not a site problem).

  - name: "New York Department of Public Service / PSC — Large Load Interconnection Reform"
    id: "ny_dps"
