  - name: "CEN-CENELEC-ETSI Green Data Centres Coordination Group"
    id: "cencenelec_green_datacentres"
    enabled: false
    base_url: "https://www.cencenelec.eu"
    start_paths:
      - "/areas-of-work/cenelec-sectors/digital-society-cenelec/green-data-centres/"
    region:
      - "eu"
    category: "standards"
    tags:
      - "efficiency"
      - "research"
    policy_types:
      - "standard"
      - "guidance"
      - "report"
    language: "en"
    verified_by: "source-expansion-research (supranational agent)"
    notes: |
      Append to config/domains/eu.yaml. The actual joint European
      Standards Organisations body (CEN, CENELEC, ETSI together) behind
      EN 50600, called out by name in the brief. One page indexes the
      entire European DC-standardization landscape and its free summary
      brochures (current: "Review of standardisation activities - Energy
      Management and Environmental Viability of Data Centres," edition
      11, 2024 — catalogues the full EN 50600 KPI series: PUE, ERF, CUE,
      WUE, etc. plus in-preparation standards). Full EN 50600 standard
      texts are paywalled through national standards bodies (same caveat
      as ISO above) — this page + brochure is free. CEN-CENELEC
      restructured their sector URLs; two older paths
      (/standards/sectors/ict/pages/greendatacentres and
      /areas-of-work/cen-sectors/digital-society/green-data-centres/)
      both 404 — use the path above instead. verified: yes (fetched
      directly, CG GDC group description + 2024 brochure link confirmed).

  - name: "Euroheat & Power - Knowledge Hub"
    id: "euroheat_power_knowledge_hub"
    enabled: false
    base_url: "https://www.euroheat.org"
    start_paths:
      - "/knowledge-hub/"
      - "/dhc/knowledge-hub/"
    region:
      - "eu"
    category: "district_heating"
    tags:
      - "efficiency"
      - "research"
      - "planning"
    policy_types:
      - "report"
      - "guidance"
    language: "en"
    rate_limit_seconds: 2.5
    verified_by: "source-expansion-research (supranational agent)"
    notes: |
      Append to config/domains/eu.yaml. International district heating &
      cooling association (members across ~30 European + non-European
      countries) — best single aggregator of data-center-waste-heat-to-
      district-heating case studies found in this pass, e.g. a named
      comparative analysis of DC waste-heat scenarios for DH networks of
      different generations, plus country-specific case studies
      (Amsterdam, Braunschweig). Some content is gated behind
      membership/newsletter prompts but articles render without login —
      rate-limit politely (2-3s). verified: yes (fetched the comparative-
      analysis article page directly, published 2025-05-26, confirmed
      on-topic).

