      crawl target. The old "Eco-Conscious Data Center Certification"
      scheme page (/climate/large_scale/dc.html) was confirmed
      DISCONTINUED since March 2017 — do not propose that path.
      verified: yes (fetched directly, program description + 1,500kL
      threshold confirmed).

