      Distinct scheme from the national METI/ANRE benchmark already
      tracked (enecho_jp). An English program-summary PDF exists
      (english.metro.tokyo.lg.jp/documents/d/english/
      outlineoftheprogram_4th, 758KB) but is image-embedded/not
