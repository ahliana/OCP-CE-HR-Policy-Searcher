  - name: "Stockholm Data Parks"
    id: "stockholm_data_parks"
    enabled: false
    base_url: "https://stockholmdataparks.com"
    start_paths:
      - "/"
      - "/about/"
    region:
      - "eu"
      - "nordic"
      - "sweden"
    category: "district_heating"
    tags:
      - "efficiency"
      - "planning"
      - "incentives"
    policy_types:
      - "program"
      - "guidance"
    language: "en"
    verified_by: "source-expansion-research (special-zones wave-4 agent)"
    verified_date: "2026-07-18"
    notes: |
      Wave 4 (special-zones.md #1) - SINGLE HIGHEST-VALUE FIND of this
      wave. Joint program of the City of Stockholm, district-heat utility
      Stockholm Exergi, grid operator Ellevio, and dark-fiber provider
      Stokab that designates industrial-park sites for data centers ON
      CONDITION they sell waste heat into the city district-heating network
      via Stockholm Exergi's Open District Heating platform. Goal: 10% of
      Stockholm's heating from recovered DC waste heat, part of the city's
      fossil-fuel-free-by-2040 plan. Site literally frames it as "a data
      center industry where no heat is wasted" - 20+ connected suppliers
      recovering enough heat for 30,000+ apartments. This is the clearest
      "zone authority mandates heat reuse" governance layer found in this
      wave. Site is a WordPress blog/news structure - content is a running
      news feed of new heat-reuse connections, best captured via periodic
      recrawl of several start_paths. Append to a new Stockholm section in
      nordic.yaml (existing nordic.yaml is Nordic-wide/national) or a new
      sweden.yaml. verified: yes - fetched directly, confirmed live and
      jointly run as described.

