    verified_date: "2026-07-18"
    notes: |
      Wave 4 (special-zones.md #4). Oman's national Special Economic Zone
      Authority at Duqm (SEZAD) publishes real guideline PDFs directly: an
      Environmental & Social Impact Assessment (ESIA) Guideline (2022), a
      Climate Change Guideline covering "Identification of Risks and
      Impacts & Resource Efficiency - Greenhouse Gases" (2021), and a
      "Cumulative Impact Assessment, Resource Efficiency, and Pollution
      Prevention Guideline" - all binding on companies developing in the
      zone. A genuine SEZ REGULATORY AUTHORITY publishing its own
      environmental/resource-efficiency guideline documents - closest
      match in the Gulf to a zone authority with actual (if generic, not
      DC-specific) mandatory guidance. PDFs are large scanned/composite
      documents - a screening pass should extract linked PDF text properly,
      not rely on a general-purpose web-fetch summarizer. Append to a new
      oman.yaml. verified: yes - index page fetched directly and confirmed
      live, listing named/dated guideline documents with working download
      links; one linked PDF fetched (confirmed resolves, ~8MB) but text
      content could not be cleanly extracted by the summarizing fetch tool
      used in this pass.

