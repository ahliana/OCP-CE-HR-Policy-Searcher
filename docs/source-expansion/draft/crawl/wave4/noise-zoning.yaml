    verified_date: "2026-07-18"
    notes: |
      Wave 4 (noise-zoning.md #2). Append to netherlands.yaml. Legal text
      also mirrored at
      https://lokaleregelgeving.overheid.nl/CVDR646404. Designates four
      data-center concentration areas (Polanenpark, Corneliahoeve,
      Schiphol-Rijk, Schiphol Trade Park) with hard MVA capacity caps
      (100/100/350/200), prohibits data centers outside those zones,
      mandates PUE < 1.2 and the LEAP framework for 20-40% energy
      reduction, requires either a district-heating waste-heat connection
      or reserved space for future waste-heat delivery, requires facilities
      over 80 MVA to build their own 150kV substation. Municipal cap of 750
      MVA through 2030 - the strongest single energy/PUE/heat-reuse bundle
      found in the whole Europe pass this wave. Haarlemmermeer
      (Amsterdam Science Park/Schiphol area) is the largest data-center
      siting fight in the Netherlands, not previously covered. Policy under
      active revision (5th concentration area being added). verified: yes -
      fetched CVDR646404 directly; quoted PUE<1.2 requirement, MVA caps,
      waste-heat conditions verbatim from the live legal text.

