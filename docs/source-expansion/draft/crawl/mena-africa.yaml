# =============================================================================
# DRAFT — Middle East + Africa source expansion (tier-b crawl domains only —
# this region produced NO tier-c candidates)
# Source: docs/source-expansion/regions/mena-africa.md
# Every entry below is `enabled: false`. NONE of these fit the three existing
# MENA/Africa files (uae.yaml, saudi_arabia.yaml, south_africa.yaml — each a
# single-country file by convention) — every country here needs its OWN new
# file: israel.yaml, turkey.yaml, nigeria.yaml, egypt.yaml, ghana.yaml,
# kuwait.yaml, morocco.yaml. rcreee_regional and afrec_au are cross-country
# supranational bodies — recommend a NEW file
# config/domains/mena_africa_regional.yaml for these two, mirroring how
# eu.yaml holds EU-level (vs. member-state) sources.
#
# Region-value note: individual countries (israel/turkey/kuwait/nigeria/
# ghana/morocco/egypt) are not in VALID_REGIONS (src/core/config.py) — mapped
# to the broad valid "middle_east"/"africa" buckets (both, for Egypt, which
# is transcontinental per the original researcher's own note). Country
# identity preserved in id/name/notes.
# =============================================================================

domains:
  - name: "Israel Ministry of Energy and Infrastructure - Policy Planning and Strategy Division"
    id: "moe_il"
    enabled: false
    base_url: "https://www.gov.il"
    start_paths:
      - "/en/departments/units/planning_department"
      - "/en/departments/ministry-of-energy-and-infrastructure"
    region:
      - "middle_east"
    category: "energy_ministry"
    tags:
      - "efficiency"
      - "planning"
      - "mandates"
    policy_types:
      - "strategy"
      - "regulation"
      - "report"
    language: "en"
    requires_playwright: true
    verified_by: "source-expansion-research (mena-africa agent)"
    notes: |
      New file: config/domains/israel.yaml. Region mapped to "middle_east"
      (see file header note). Israel's Ministry of Energy published an
      inter-ministerial interim policy specifically on data-center/
      server-farm energy demand (Feb 2026, covered by Israeli legal/
      policy press), including planning standards meant to "reduce energy
      consumption, minimize waste and maximize renewable energy use" for
      data centers — one of the most directly on-topic finds in the whole
      region. Plain HTTP fetch (no browser) returned 403 twice; a real
      browser session loaded it cleanly — very likely bot-detection on
      gov.il's CDN, requires_playwright recommended. verified: yes (via
      browser, page title + RIA-report links confirmed).

  - name: "RCREEE - Regional Center for Renewable Energy and Energy Efficiency"
    id: "rcreee_regional"
    enabled: false
    base_url: "https://rcreee.org"
    start_paths:
      - "/publications"
      - "/policies"
    region:
      - "middle_east"
      - "africa"
    category: "coordination_body"
    tags:
      - "efficiency"
      - "research"
      - "planning"
    policy_types:
      - "report"
      - "guidance"
    language: "en"
    verified_by: "source-expansion-research (mena-africa agent)"
    notes: |
      New file: config/domains/mena_africa_regional.yaml (cross-country
      supranational body, not a single-country file). Category mapped
      from original "policy" to "coordination_body" (closest exact fit
      for a 17-member-state intergovernmental body: Algeria, Bahrain,
      Djibouti, Egypt, Iraq, Jordan, Kuwait, Lebanon, Libya, Mauritania,
      Morocco, Palestine, Somalia, Sudan, Syria, Tunisia, Yemen). Best
      leverage-per-source find in the region — one source, 17 countries.
      Publications include "Governance of Renewable Energy and Energy
      Efficiency Policies in Arab States," a National Cooling Action Plans
      (NCAP) workshop report, country-specific efficiency studies for
      Egypt. WordPress site, robots.txt blocks only /wp-admin/, sitemap at
      /wp-sitemap.xml. verified: yes (publications page lists 40+ PDF
      titles including those named above).

