      fetch and stayed empty even after a short wait in a real browser
      session — very likely a heavy client-side app (React/Angular)
      needing longer render time/specific routing. requires_playwright
      with an increased load-wait strongly recommended; may still need
      additional wait/scroll logic (possibly tier-c if content is served
      via an internal API the crawler can't trigger). Candidate
      start_path (/en/renewableenergy) per search results, NOT
      independently re-verified this session. verified: partial — domain
