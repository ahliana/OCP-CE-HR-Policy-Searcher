      an EU-aligned building energy efficiency framework the regulator
      co-administers. Site groups content by sector (Electricity, Natural
      Gas, Petroleum, LPG, Energy Transition) — allowed_path_patterns
      tuned to Electricity + Energy Transition to avoid petroleum/LPG
