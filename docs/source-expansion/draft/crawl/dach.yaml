# =============================================================================
# DRAFT — DACH (Germany/Austria/Switzerland) subnational source expansion
# (tier-b crawl domains only — this region produced NO tier-a or tier-c
# candidates, every source below is a plain government/legal-text portal).
# Source: docs/source-expansion/regions/dach.md
# Every entry below is `enabled: false`.
#   - German entries append to config/domains/germany.yaml (all 16 Laender
#     will have ministry+Landesrecht coverage once these 8 new Laender ship).
#   - Austrian entries append to config/domains/austria.yaml.
#   - Swiss cantonal entries go to a NEW file config/domains/switzerland.yaml
#     is NOT new (it already exists with federal + Zurich) — these 4 new
#     canton sections (Geneva, Basel-Stadt, Vaud, Bern) append to it.
#
# Region-value note: individual Swiss cantons other than Zurich, and German
# Laender other than the 8 already in VALID_REGIONS (hessen, bayern,
# nordrhein_westfalen, baden_wuerttemberg, berlin, hamburg, niedersachsen,
# sachsen), are not in the live VALID_REGIONS enum in src/core/config.py.
# Mapped to the broader valid "switzerland" / "germany" region value below;
# the specific canton/Land name is preserved in the `id` and `notes` for
# discoverability. Unrecognized region values only trigger a config-loader
# warning, not a hard failure, so this is a documentation choice, not a
# functional requirement.
# =============================================================================

domains:
  - name: "Geneve - Loi sur l'energie (LEn) rsGE L 2 30"
    id: "ge_len_energie"
    enabled: false
    base_url: "https://silgeneve.ch"
    start_paths:
      - "/legis/data/rsg_l2_30.htm"
    region:
      - "eu_central"
      - "switzerland"
    category: "legislation"
    tags:
      - "mandates"
      - "waste_heat"
      - "data_center_specific"
      - "district_heating"
    policy_types:
      - "law"
    language: "fr"
    verified_by: "source-expansion-research (dach agent)"
    notes: |
      Region mapped: canton is Geneva (not in VALID_REGIONS' explicit
      canton list, which only lists "zurich" — mapped to "switzerland").
      Article 17A explicitly names "les chaleurs emises par les serveurs
      informatiques" (heat emitted by computer servers) as subject to
      Geneva's mandatory heat-recovery framework — most explicit
      non-German DACH statutory text naming data centers by name.
      Complements the German EnEfG and Zurich cantonal law already
      configured. Single consolidated-law page, low update frequency.
      verified: yes (WebFetch, Art. 17A text captured directly, page last
      modified 2026-07-04).

