# expansion (tier-b crawl domains only)
# Source: docs/source-expansion/regions/eu-uncovered.md
# Every entry below is `enabled: false`. NEW country files needed for all 10
# countries (none of these fit an existing config/domains/*.yaml file):
# croatia.yaml, slovenia.yaml, bulgaria.yaml, latvia.yaml, serbia.yaml,
# ukraine.yaml, cyprus.yaml, malta.yaml, slovakia.yaml, lithuania.yaml.
# Tier-c candidates for this region (European Parliament Open Data API v2,
# data.europa.eu Search API [also cross-listed in supranational.md — merged],
