# — see docs/source-expansion/draft/new-clients.md.
#
# Region-value note: Croatia/Slovenia/Bulgaria/Serbia/Ukraine/Slovakia/
# Latvia/Lithuania are not individually in VALID_REGIONS (src/core/config.py)
