# mapped to "eu_south". Country identity is preserved in id/name/notes.
# Serbia and Ukraine are not EU members (Energy Community/candidate-country
# status) — the original researcher tagged them "eu" for policy-alignment
# purposes; kept as-is per that judgment call, noted below.
# =============================================================================

