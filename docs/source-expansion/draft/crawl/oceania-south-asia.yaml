    policy_types:
      - "regulation"
      - "guidance"
    language: "en"
    verified_by: "source-expansion-research (oceania agent)"
    notes: |
      Append to config/domains/australia.yaml. Highest-value find in the
      whole region: AER publishes a dedicated "Data Centre Connections"
      guidance document (PAL RRP BUS 3.6.01, Dec 2025) and multiple
      distribution-determination attachments discussing DC connection cost
      allocation (e.g. Powercor 2026-31 "Connection policy" attachment). A
      national economic regulator writing rules specifically about DC grid
      connections — most DC-specific regulatory document found region-
      wide. Direct WebFetch to the root domain timed out (likely
      bot-detection on "/"); sub-pages and PDFs resolved per
      search-engine cache/snippets. verified: yes (WebSearch confirmed
      live PDF URLs; root-domain direct fetch not independently
      re-confirmed — one confidence level below a full direct fetch).

