# =============================================================================
# DRAFT — Oceania + South Asia + Southeast Asia source expansion (tier-b
# crawl domains only)
# Source: docs/source-expansion/regions/oceania-south-asia.md
# Every entry below is `enabled: false`. AU entries append to
# config/domains/australia.yaml. India entries append to
# config/domains/india.yaml. NZ entries need a NEW file
# config/domains/new_zealand.yaml. Philippines/Malaysia/Indonesia/Vietnam
# each need a NEW file (philippines.yaml, malaysia.yaml, indonesia.yaml,
# vietnam.yaml) — zero prior coverage for any of the four.
# Tier-c candidate for this region (New Zealand Legislation API) is NOT in
# this file — see docs/source-expansion/draft/new-clients.md.
#
# Region-value note: Western Australia/Queensland/Victoria are not
# individually in VALID_REGIONS (only new_south_wales/south_australia are) —
# mapped to the broader valid "australia". Rajasthan/Haryana/West Bengal/
# Gujarat are likewise not individual (only karnataka/tamil_nadu/telangana/
# maharashtra are) — mapped to "india". New Zealand, Philippines, Malaysia,
# Indonesia, Vietnam are not in VALID_REGIONS at all — mapped to the broad
# "apac" bucket. State/country identity is preserved in id/name/notes.
# =============================================================================

