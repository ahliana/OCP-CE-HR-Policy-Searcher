      Wave 3 (permitting-eia.md #3). New regulations effective Jan 2026
      formally brought data centres into the NSIP regime (opt-in via
      Secretary of State direction under Planning Act 2008 s.35) - a
      genuinely new UK consenting pathway for large DCs decided nationally
      via a statutory Development Consent Order process incl. EIA. uk.yaml
      already has Environment Agency (generator permits) + Heat Networks
      Planning Database but nothing on the NSIP/DCO track. Append to
      uk.yaml. verified: yes - direct WebFetch got HTTP 403 (bot
      protection); curl with a standard browser User-Agent returned HTTP
      200, title confirmed. Recommend requires_playwright: true or a
      custom UA.

