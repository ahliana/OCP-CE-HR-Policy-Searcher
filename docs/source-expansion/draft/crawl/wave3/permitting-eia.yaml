    verified_date: "2026-07-18"
    notes: |
      Wave 3 (permitting-eia.md #6). Miljostyrelsen is the national-level
      environmental approval authority for "Annex 1/2" listed polluting
      activities (most delegated to municipalities, MST retains authority
      for the subset marked "s"); mechanism through which DC cooling-water
      discharge, noise, and generator-emissions conditions are set.
      denmark.yaml today only has the Danish Energy Agency + Heat Supply
      Act text - no environmental-permitting body. Links to the digital
      application system "Byg og Miljoe"/DMA at dma.mst.dk. Append to
      denmark.yaml. verified: yes - HTTP 200, approval-process description
      confirmed (authority split between municipalities/MST, conditions
      cover emissions/noise/vibration/groundwater).

