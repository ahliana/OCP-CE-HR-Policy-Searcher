    notes: |
      Wave 3 (permitting-eia.md #5). PENDING HUMAN CHECK on page-level
      specificity (see caveat below). Sweden requires data centres to
      secure a Chapter 9 Environmental Code permit ("B-verksamhet") via the
      county's Miljoprovningsdelegationen when material environmental
      impact exists; a Naturvardsverket decision PDF found separately
