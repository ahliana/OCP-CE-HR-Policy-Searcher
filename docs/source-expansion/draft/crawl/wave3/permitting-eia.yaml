      - "report"
    language: "en"
    requires_playwright: true
    verified_by: "source-expansion-research (permitting-eia wave-3 agent)"
    verified_date: "2026-07-18"
    notes: |
      Wave 3 (permitting-eia.md #2). Ireland's national planning-appeal
      authority - every large DC planning decision (and its EIAR/
      environmental conditions: noise, grid connection, backup generation)
      not resolved at local-authority level ends up here. Ireland is the
      live EU test case for DC planning friction (Dublin grid-connection
      moratorium, Ennis/AWS North Dublin appeals, Equinix refusal).
      Nothing in ireland.yaml currently covers planning appeals. Search
      covers 2016-present; filters incl. ABP case number, planning
      authority, address, date ranges, case type (incl. Strategic
      Infrastructure Development), decision outcome, EIAR/NIS indicators -
      likely needs Playwright (interactive filter form, not GET params).
      Append to ireland.yaml. verified: yes - filterable case-search tool
      confirmed live with the fields listed.

