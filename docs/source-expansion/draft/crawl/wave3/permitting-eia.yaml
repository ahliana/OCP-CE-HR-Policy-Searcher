domains:
  - name: "Environmental Protection Agency Ireland - Industrial Emissions Licensing"
    id: "epa_ie_ied"
    enabled: false
    base_url: "https://www.epa.ie"
    start_paths:
      - "/our-services/licensing/industrial/industrial-emissions-licensing-ied/"
      - "/our-services/licensing/licencesearch/"
    region:
      - "eu"
      - "eu_west"
      - "ireland"
    category: "regulatory"
    tags:
      - "mandates"
      - "planning"
      - "reporting"
    policy_types:
      - "regulation"
      - "guidance"
    language: "en"
    verified_by: "source-expansion-research (permitting-eia wave-3 agent)"
    verified_date: "2026-07-18"
    notes: |
      Wave 3 (permitting-eia.md #1). The actual enforcement mechanism
      behind Ireland's DC backup-generator rules - IE licences mandatory
      once backup generator thermal input hits 50MW aggregate, or
      operation exceeds 18 hrs/yr. Secondary sources report EPA has
      approved 15 IE licences + 24 GHG permits specifically to DC
      operators, 800+ generators listed as emission sources. Not in
      ireland.yaml today (only SEAI, gov.ie, CRU, statute book). The
      underlying dynamic search app (epawebapp.epa.ie) returned HTTP 500
      on a plain fetch - needs a live browser session, see unverified
      notes; the two static pages here are sufficient to start. Additive
      alongside wave-3 water-cooling.yaml's ie_epa_water_abstraction (same
      host, water licensing instead). Append to ireland.yaml. verified:
      yes - both pages HTTP 200, titles confirmed.

  - name: "An Coimisiun Pleanala (formerly An Bord Pleanala) - Case Search"
