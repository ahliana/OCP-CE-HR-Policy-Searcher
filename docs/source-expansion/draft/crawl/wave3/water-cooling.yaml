    verified_date: "2026-07-18"
    notes: |
      Wave 3 (water-cooling.md #5). Mandatory Water Efficiency Management
      Practices (MWEMP, since 2015) - data centers/large water users above
      60,000 m3/year must submit annual consumption, a Water Efficiency
      Management Plan, and install sub-meters; feeds Singapore's sectoral
      WUE benchmark. Append to config/domains/apac.yaml (new Singapore
      water-agency section, alongside existing imda_sg/BCA entries - PUB is
      the water regulator, not previously covered). Enum note: original tag
      "wue" is not in VALID_TAGS; mapped to "efficiency" here - see file
      header. verified: yes via the linked PDF guide (200, downloaded,
      content confirms thresholds/reporting); HTML landing page confirmed
      live via browser render but is client-rendered.
    requires_playwright: true

