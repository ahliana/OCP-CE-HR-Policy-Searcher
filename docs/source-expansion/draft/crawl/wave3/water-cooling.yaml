# =============================================================================
# DRAFT WAVE 3 — Water & Cooling Regulation (tier-b crawl domains only)
# Source: docs/source-expansion/regions-wave3/water-cooling.md
# Every entry below is `enabled: false`. All 9 candidates in the source file
# are tier-b; no tier-a/tier-c candidates in this file.
#
# Enum note: VALID_TAGS (src/core/config.py) has no water-specific tag at
# all ("waste_heat"/"district_heating"/"pue_limits" etc. are energy-only).
# Two entries below want tags not in the current enum:
#   - "water_quality" (candidate #2, NL Unie van Waterschappen) — mapped to
#     "planning" (closest existing tag), original intent kept in notes.
#   - "wue" (candidate #5, Singapore PUB) — mapped to "efficiency" (closest
#     existing tag; Water Use Efficiency is the water-side analogue of PUE).
# Recommend a small VALID_TAGS addition (e.g. "water_use" or
# "water_stewardship") given this is a newly-opened regulatory dimension for
# the project, not a one-off.
#
# Append-to targets (per-file notes below repeat this):
#   - config/domains/us/virginia.yaml    -> va_deq_water
#   - config/domains/us/arizona.yaml     -> az_water_resources
#   - config/domains/us/texas.yaml       -> tx_tceq_water_rights
#   - config/domains/us/california.yaml  -> ca_dwr_water_use, ca_swrcb_water_rulemaking
#   - config/domains/netherlands.yaml    -> nl_unie_waterschappen_dc, nl_hhnk_datacenters
#   - config/domains/ireland.yaml        -> ie_epa_water_abstraction
#   - config/domains/apac.yaml           -> sg_pub_water_efficiency
#
# Cross-reference: `ie_epa_water_abstraction` (base_url epa.ie) is additive
# alongside wave-3 permitting-eia.yaml's `epa_ie_ied` (same host, different
# licensing program: water abstraction vs. industrial-emissions licensing).
# `va_deq_water` (deq.virginia.gov) is additive alongside permitting-eia.yaml's
# `va_deq_dc_air_permits` (same agency, water withdrawal vs. air permits).
# `tx_tceq_water_rights` (tceq.texas.gov) is additive alongside
# permitting-eia.yaml's `tceq_air_generators` (same agency, water rights vs.
# air permitting for generators). None of these are id/base_url+start_path
# duplicates — different programs, different start_paths.
# =============================================================================

domains:
  - name: "Virginia Department of Environmental Quality - Water Withdrawal"
    id: "va_deq_water"
    enabled: false
    base_url: "https://www.deq.virginia.gov"
    start_paths:
      - "/water/water-withdrawal"
      - "/water/water-quantity/water-supply-planning/water-withdrawal-reporting"
    region:
      - "us"
      - "us_states"
      - "virginia"
    category: "environmental_agency"
    tags:
      - "mandates"
      - "reporting"
      - "planning"
    policy_types:
      - "regulation"
      - "law"
    language: "en"
    verified_by: "source-expansion-research (water-cooling wave-3 agent)"
    verified_date: "2026-07-18"
    notes: |
      Wave 3 (water-cooling.md #1). Ground Water Management Act of 1992 +
      Groundwater Withdrawal Regulations (permits at 300,000+ gal/month);
      Virginia Water Protection Permit Program for surface water; this page
      is the DEQ side of 2026 HB589 (utility-level data-center water-sale
      reporting from Jan 1 2027). Append to config/domains/us/virginia.yaml.
      Additive alongside permitting-eia.yaml's va_deq_dc_air_permits (same
      agency, air permits not water). verified: yes - direct fetch got HTTP
      403 (bot protection); a real browser render loaded it cleanly and
      confirmed on-topic content. Recommend requires_playwright: true or a
      browser User-Agent at crawl-config time.
    requires_playwright: true

