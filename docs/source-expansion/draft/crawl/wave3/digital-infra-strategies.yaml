      - "guidance"
    language: "en"
    verified_by: "source-expansion-research (digital-infra-strategies wave-3 agent)"
    verified_date: "2026-07-18"
    notes: |
      Wave 3 (digital-infra-strategies.md #1 - highest-value find). Ireland's
      Department of Enterprise, Trade and Employment (not SEAI/CRU/gov.ie,
      already covered) is the ministry actually setting DC siting and
      renewable-supply policy - incl. the widely-reported rule that new
      >=1MVA data centres must source 80% of annual demand from new
      in-country renewables within 6 years of operation. The "twin
      transition" (digitalisation + decarbonisation) framing document.
      Category note: original "digital_ministry" mapped to "policy" - see
      file header. Append to ireland.yaml. verified: yes - HTTP 200, DETE
      authorship and July 2022 publication date confirmed.

