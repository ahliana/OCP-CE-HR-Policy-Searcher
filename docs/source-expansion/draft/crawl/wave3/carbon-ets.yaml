# =============================================================================
# DRAFT WAVE 3 — Carbon Pricing / Emissions Trading / Climate-Compliance
# Bodies (tier-b crawl domains only)
# Source: docs/source-expansion/regions-wave3/carbon-ets.md
# 21 of the 22 candidates in the source file are tier-b (drafted below);
# candidate #21 (epa_ghgrp_envirofacts_api, US EPA Envirofacts GHGRP REST
# API) is tier-c - specced in docs/source-expansion/draft/new-clients-wave3.md
# instead. Candidate #22 (kr_etrs_registry) is tier-b but only PARTIALLY
# verified (content not independently re-fetched, only the bare path) -
# flagged inline below; recommend a human confirm crawlability before
# enabling.
#
# Shared-domain additive entries (same base_url as an EXISTING config entry,
# different department/topic - same precedent as eur-lex.europa.eu (4
# entries) / gov.uk (30+ entries) already in the codebase):
#   - ww2.arb.ca.gov: existing carb_generators (us/california.yaml, backup
#     generators) vs. new ca_carb_cap_trade (cap-and-trade program).
#   - meti.go.jp: existing meti_jp (apac.yaml, English GX growth strategy)
#     vs. new jp_meti_gx_ets (Japanese-language ETS-specific page).
#   - bafu.admin.ch: existing bafu_buildings (switzerland.yaml, building
#     climate rules) vs. new ch_bafu_ets (Swiss ETS).
#   - alberta.ca: existing alberta_energy (canada.yaml, general energy/
#     environment landing pages) vs. new ab_tier (TIER regulation, a specific
#     new start_path).
#   - gov.uk: existing 8+ uk.yaml entries vs. new uk_ets_participating,
#     uk_secr, uk_esos (distinct carbon-market/reporting topics).
# None of these are id/base_url+start_path duplicates.
#
# Append-to targets:
#   - eu.yaml            -> eu_ets_main, eu_ets2_buildings_transport,
#                            eu_ets_union_registry, eurlex_csrd_2022_2464
#   - uk.yaml             -> uk_ets_participating, uk_secr, uk_esos
#   - germany.yaml        -> de_dehst_nehs
#   - config/domains/us/california.yaml -> ca_carb_cap_trade
#   - NEW file or config/domains/us_federal-style entry -> us_rggi (multi-state,
#     recommend region: ["us","us_states"], no single state file)
#   - australia.yaml      -> au_cer_safeguard, au_cer_nger
#   - NEW new_zealand section (apac.yaml or new file) -> nz_epa_ets
#   - switzerland.yaml    -> ch_bafu_ets
#   - apac.yaml           -> jp_meti_gx_ets, jp_gx_league, cn_mee_ghg,
#                            kr_etrs_registry (Korea - new section)
#   - canada.yaml         -> qc_spede, ab_tier
#   - NEW us_federal.yaml or config/domains/us/us_federal.yaml -> us_epa_ghgrp
#
# Enum note: no invalid category/tag/policy_type values in this file - all
# fit VALID_CATEGORIES/VALID_TAGS/VALID_POLICY_TYPES directly. Region value
# "china" used by cn_mee_ghg is NOT in VALID_REGIONS (carried-forward gap
# already flagged in wave-2's INVENTORY.md recap); mapped to "apac" below.
# "new_zealand" (nz_epa_ets) is likewise not in VALID_REGIONS; mapped to
# "apac" following the same wave-1/2 precedent used for NZ entries.
# =============================================================================

