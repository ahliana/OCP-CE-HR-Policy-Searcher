    id: "aeso_large_load"
    enabled: false
    base_url: "https://www.aeso.ca"
    start_paths:
      - "/grid/connecting-to-the-grid/large-load-projects/"
      - "/grid/connecting-to-the-grid/process-updates/"
    region:
      - "north_america"
      - "canada"
      - "alberta"
    category: "grid_operator"
    tags:
      - "mandates"
      - "planning"
      - "efficiency"
    policy_types:
      - "guidance"
      - "regulation"
      - "report"
    language: "en"
    verified_by: "source-expansion-research (canada agent)"
    notes: |
      Highest-value Canada find. AESO's live framework for connecting data
      centres to Alberta's grid (1,200MW interim cap, Phase 2 large-load
      integration, "Guide to AESO Connection Requirements for
      Transmission-Connected Data Centres" posted Jun 2026) — explicitly
      discusses waste-heat/self-generation considerations for large loads.
      robots.txt not fetchable by tooling but page loads fine in-browser;
      no evidence of a real crawl restriction. verified: yes (live browser
      fetch, June 2026-dated content).

