# =============================================================================
# DRAFT — Latin America source expansion (tier-b crawl domains only)
# Source: docs/source-expansion/regions/latam.md
# Every entry below is `enabled: false`. Brazil/Mexico already ship
# (brazil.yaml/mexico.yaml) and are not touched. NEW files needed: chile.yaml,
# colombia.yaml, argentina.yaml, peru.yaml, uruguay.yaml, costa_rica.yaml.
# Tier-c candidate for this region (LeyChile/BCN Legislative Web Service) is
# NOT in this file — see docs/source-expansion/draft/new-clients.md.
#
# Region-value note: Chile/Colombia/Argentina/Peru/Uruguay are not
# individually in VALID_REGIONS (src/core/config.py) — the broad valid
# "south_america" bucket already covers them, used as-is. Costa Rica is
# Central American; VALID_REGIONS has no "central_america" bucket — mapped
# to the broader (imperfect) "north_america" per its own comment ("North
# America: US, Canada, Mexico"), noted explicitly below since Costa Rica
# doesn't really fit that description either.
# =============================================================================

domains:
  - name: "Ministerio de Energia - Chile"
    id: "energia_cl"
    enabled: false
    base_url: "https://energia.gob.cl"
    start_paths:
      - "/mini-sitio/reglamentos"
      - "/eficienciaenergetica"
      - "/panel/plan-de-descarbonizacion"
    region:
      - "south_america"
    category: "energy_ministry"
    tags:
      - "efficiency"
      - "renewable_energy"
      - "planning"
    policy_types:
      - "regulation"
      - "strategy"
      - "law"
    language: "es"
    requires_playwright: false
    verified_by: "source-expansion-research (latam agent)"
    notes: |
      New file: config/domains/chile.yaml. Primary national energy policy
      body for Chile, currently the largest LatAm data-center market by MW
      under construction. National energy policy to 2050, decarbonization
      plan, Energy Efficiency Law (Ley 21.305) implementation, green
      hydrogen strategy. Open energy data portal (energiaabierta.cl) is a
      SEPARATE domain, not included here. /panel/* decarbonization pages
      use moderate JS — requires_playwright: true recommended for those
      specifically, false should suffice for /eficienciaenergetica.
      verified: yes (root fetched, all three sections confirmed).

  - name: "CNE - Comision Nacional de Energia (Chile)"
    id: "cne_cl"
    enabled: false
    base_url: "https://www.cne.cl"
    start_paths:
      - "/normativas"
      - "/estadisticas"
    region:
      - "south_america"
    category: "regulatory"
    tags:
      - "mandates"
      - "reporting"
    policy_types:
      - "regulation"
      - "report"
    language: "es"
    verified_by: "source-expansion-research (latam agent)"
    notes: |
      New file: config/domains/chile.yaml. Electricity/hydrocarbon sector
      technical-regulation portal ("Portal Normativo"), tariff-setting
      resolutions, public consultations. Site explicitly discusses
      data-center-driven grid demand growth. verified: yes (root fetched,
      Normativas/statistics sections + a DC grid-impact news item
      confirmed).

  - name: "SEC - Superintendencia de Electricidad y Combustibles (Chile)"
    id: "sec_cl"
    enabled: false
    base_url: "https://www.sec.cl"
    start_paths:
      - "/transparencia/marconormativo.html"
    max_depth: 2
    region:
      - "south_america"
    category: "standards"
    tags:
      - "mandates"
    policy_types:
      - "standard"
      - "regulation"
    language: "es"
    verified_by: "source-expansion-research (latam agent)"
    notes: |
      New file: config/domains/chile.yaml. Electrical installation safety
      regulations (Decreto 08), technical pliegos (RPTD series), NCh Elec.
      4/2003 low-voltage standard — the binding technical-standards layer
      under CNE/Energy Ministry policy. Homepage itself is mostly
      citizen-services framed (complaints, installer lookup); regulatory
      content lives under /transparencia/ and a wp-content uploads path —
      confirmed via targeted search, not homepage crawl, so max_depth >= 2
      is set and the crawler should NOT rely on homepage links alone.
      verified: yes, indirectly (targeted search confirmed the path +
      several live regulation/standard PDFs).

