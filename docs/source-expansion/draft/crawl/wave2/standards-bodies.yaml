domains:
  - name: "National Standards Information Public Service Platform (China, SAMR/SAC)"
    id: "china_std_samr"
    enabled: false
    base_url: "https://std.samr.gov.cn"
    start_paths:
      - "/gb/search/gbDetailed?id=2E4DD4D8E2E84A4BE06397BE0A0AE354"
    region:
      - "apac"
    category: "standards"
    tags:
      - "efficiency"
      - "mandates"
      - "reporting"
    policy_types:
      - "standard"
      - "regulation"
    language: "zh"
    requires_playwright: true
    notes: |
      Wave 2 (standards-bodies.md #1). HIGHEST-VALUE FIND OF THIS WAVE.
      Free, full regulatory text for GB 40879 (mandatory data-center PUE
      limits: <=1.5 floor, Grade 2 <=1.3, Grade 1 <=1.2), drafting
      committee TC20, and the exact policy gap driving the pending revision
      (China's 2024 four-ministry action plan requires <=1.25 by end of
      2025 for new large/hyperscale DCs — stricter than current GB 40879).
      Search UI is JS-driven — seed with specific detail-page ids rather
      than link-following from a static start page; requires_playwright
      recommended. New file config/domains/china.yaml needed regardless
      (already flagged by wave-1's east-asia.yaml draft). verified: yes —
      fetched the detail page directly, confirmed Chinese regulatory text,
      standard number, committee, PUE-gap rationale.

