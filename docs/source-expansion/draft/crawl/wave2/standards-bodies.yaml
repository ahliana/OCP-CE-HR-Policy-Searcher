    notes: |
      Wave 2 (standards-bodies.md #4). Distinct organization/domain from
      wave-1's ISO catalog entry (iso.org) — IEC's own commercial webstore,
      with its own free abstract text and pricing/edition metadata (2026
      edition of 30134-2/PUE already listed here vs. the older -6/ERF part
      wave-1 checked on iso.org). Individual publication IDs are stable,
      numeric, non-sequential — a maintainer must re-search periodically
      for new parts/editions rather than guess URLs; search/browse pages
      403/404'd to automated fetch, direct publication-ID URLs worked.
      Coverage is metadata/abstract only, full text paywalled (CHF 159 for
      30134-2) — max_depth: 1, do not attempt to crawl past the abstract
      layer, same caveat wave-1 gave the ISO entry. Recommend region
      ["supranational","global"] once those enum values land (flagged
      wave 1 already); using ["eu"] as closest allowed placeholder
      meanwhile is imprecise — new supranational.yaml file recommended
      instead of forcing a country bucket. verified: yes — fetched both
      publication pages directly, confirmed titles/prices/free-abstract
      text and the 2026 edition note.

