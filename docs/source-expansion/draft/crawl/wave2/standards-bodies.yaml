      Wave 2 (standards-bodies.md #3). Standard 90.4 (Energy Standard for
      Data Centers) and Standard 127 (data-center/ITE air-conditioning test
      method) are the two standards the brief names by number, and 90.4 is
      already cited by tag in config/domains/us/oregon.yaml today. Free
      read-only preview after registration; addenda for continuous-
      maintenance standards (90.4 is one) are free PDFs, no login; full
      purchasable text is paywalled. Region ideally dual-tagged
      ["us","supranational"] per the brief's own convention for
      extra-jurisdictional standards (Korean/Spanish translations exist)
      — "supranational" is not yet a valid VALID_REGIONS value, flag for
      enum addition; using ["us"] only here until that lands. New file
      config/domains/supranational.yaml recommended (joins wave-1's
      IEA 4E EDNA / ISO 30134 / C40 entries). verified: yes — fetched
      standards-and-guidelines page and datacom-series bookstore page
      directly; confirmed free-preview model, 90.4-2025 and 127-2020
      both listed.

