    language: "es"
    notes: |
      Wave 2 (multilateral-portals.md Target 1 #5). 27-member Ibero-
      American/LatAm energy IGO (Quito, Ecuador) — the brief's explicit
      OLADE ask. Publishes Energy Outlook reports, the ENERLAC journal,
      cross-country statistical series (1970-present) across all 27
      member states. Has an English section (/en/) and a SieLAC
      statistical portal (not confirmed as an API this pass — likely a
      web UI, follow-up pass needed before considering tier-c). verified:
      yes — fetched /en/ directly, confirmed title, SieLAC/ENERLAC/Energy
      Outlook references.

  - name: "Cool Coalition (UNEP) - Cooling Policy Hub"
    id: "cool_coalition"
    enabled: false
    base_url: "https://coolcoalition.org"
    start_paths:
      - "/knowledge-hub"
      - "/working-groups"
      - "/global-cooling-pledge"
    region:
      - "eu"
    category: "district_heating"
    tags:
      - "efficiency"
      - "planning"
      - "carbon"
    policy_types:
      - "guidance"
      - "report"
      - "standard"
    language: "en"
    notes: |
      Wave 2 (multilateral-portals.md Target 1 #6). UNEP-hosted global
      coalition (governments, cities, business) — the brief's explicit
      district-cooling/cooling-specific ask. Tracks National Cooling
      Action Plans (NCAPs) by country, a Policy Toolkit for Sustainable
      Cooling, MEPS/procurement working groups, Global Cooling Pledge
      (250+ signatories) — the closest global equivalent to a
      district-cooling regulator index. CATEGORY NOTE: no "district_cooling"
      value exists in VALID_CATEGORIES today — mapped to the closest
      allowed value, "district_heating" (heat network authorities), which
      is thematically close but not exact; recommend adding
      "district_cooling" as a dedicated category. Region ideally
      ["supranational","global"] once those enum values land (flagged
      wave 1); using "eu" as a placeholder is imprecise for a genuinely
      global body — new supranational.yaml file recommended instead of
      forcing a country/regional bucket. verified: yes — fetched directly,
      confirmed title and all named working groups/pledge count.

  - name: "Climate Change Laws of the World (Grantham Research Institute / LSE)"
    id: "climate_laws_lse"
    enabled: false
    base_url: "https://climate-laws.org"
    start_paths:
      - "/"
    region:
      - "eu"
    category: "legislative"
    tags:
      - "mandates"
      - "research"
      - "reporting"
    policy_types:
      - "law"
      - "report"
    language: "en"
    requires_playwright: true
    notes: |
      Wave 2 (multilateral-portals.md Target 1 #7). 196-country climate-law
      database, LSE Grantham Research Institute, now powered by Climate
      Policy Radar's NLP search — the brief's explicit "LSE Grantham has
      data" ask. NOT the same as Climate Policy Radar's own API, which
      wave 1 already confirmed is "coming soon," not live — this proposes
      crawling the public search/browse website itself. Likely
      JS-rendered (React-style) search results — requires_playwright is a
      reasonable default pending confirmation; the exact filtered-search
      URL pattern (e.g. /search?q=energy+efficiency) was not independently
      confirmed this pass. Over 7,000 climate laws/policies/UNFCCC
      submissions indexed; a bulk-export "Download our data" form exists
      but was not tested. Recommend region ["supranational","global"] once
      those enum values land; new supranational.yaml file recommended.
      verified: yes, with caveat — homepage/search-landing copy confirmed
      live; exact filtered-search URL and no-JS rendering NOT confirmed.

  - name: "SEforALL - Research and Analysis"
    id: "seforall_research"
    enabled: false
    base_url: "https://www.seforall.org"
    start_paths:
      - "/our-work/research-analysis"
    region:
      - "eu"
    category: "standards"
    tags:
      - "efficiency"
      - "research"
    policy_types:
      - "report"
      - "guidance"
    language: "en"
    notes: |
      Wave 2 (multilateral-portals.md Target 1 #8). UN-affiliated global
      SDG7 body — the brief's explicit SEforALL ask. 181 research outputs
      filterable by programme area/SDG7 target/region/country — a
      publication hub, not a queryable database or API; no downloadable
      structured dataset or policy tracker found. Lower priority than the
      district-cooling-specific Cool Coalition entry above, but a
      legitimate, currently-updated global energy-access/efficiency
      knowledge hub (cooling-sector "Chilling Prospects" series, eCooking
      guidance). Recommend region ["supranational","global"] once those
      enum values land; new supranational.yaml file recommended.
      verified: yes — fetched directly, confirmed title, 181 outputs,
      cooling/eCooking publications named explicitly.
