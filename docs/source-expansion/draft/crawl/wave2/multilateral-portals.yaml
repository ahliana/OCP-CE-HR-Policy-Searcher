domains:
  - name: "ECREEE - ECOWAS Centre for Renewable Energy and Energy Efficiency"
    id: "ecreee_regional"
    enabled: false
    base_url: "https://www.ecreee.org"
    start_paths:
      - "/energy-efficiency/"
      - "/regional-policies/"
      - "/regional-progress-reports/"
      - "/country-documents/"
    region:
      - "africa"
    category: "coordination_body"
    tags:
      - "efficiency"
      - "planning"
      - "research"
    policy_types:
      - "report"
      - "guidance"
      - "directive"
    language: "en"
    notes: |
      Wave 2 (multilateral-portals.md Target 1 #1). Direct regional
      counterpart to the already-shipped RCREEE (Arab states) and AFREC
      (AU) entries — ECOWAS-specific (15 West African member states), a
      dedicated Energy Efficiency section holding consolidated regional
      policy documents, not just renewables. Also links to eis.ecowas.int
      ("ECOWREX" data platform) — worth a follow-up pass for a possible
      API. verified: yes — fetched directly, confirmed title and all
      named sections live.

