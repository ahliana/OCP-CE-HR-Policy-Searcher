  - name: "Grant County PUD — Evolving Industry (Data Center) Rate Schedules (Washington)"
    id: "us_grant_county_pud_wa"
    enabled: false
    base_url: "https://www.grantpud.org"
    start_paths:
      - "/rates-fees"
    region:
      - "us"
      - "us_states"
      - "washington"
    category: "regulatory"
    tags:
      - "mandates"
      - "planning"
      - "data_center_specific"
    policy_types:
      - "regulation"
      - "program"
    language: "en"
    notes: |
      Wave 2 (us-local.md #1). Special-purpose local government (county-
      created public utility district) — Rate Schedule 17 ("Evolving
      Industry") restructures pricing for data centers/crypto/AI compute
      effective Apr 2026, strips preferential hydropower access, creates a
      core-vs-non-core cost-allocation policy, layers demand charges as DCs
      reach 48% of Grant County's retail electric sales. Quincy/Grant
      County WA is one of the densest US DC clusters. Rate-schedule PDFs
      live under versioned paths that churn year to year — crawl the
      /rates-fees index and follow PDF links rather than hardcoding dated
      paths. Append to config/domains/us/washington.yaml. verified: yes —
      WebFetch confirmed the official page listing Rate Schedule 17
      tiers and linking current PDF resolutions; corroborated by
      KilowattLogic/gcj.news coverage.

  - name: "Linn County, Iowa — Data Centers in Unincorporated Linn County"
