      - "mandates"
      - "data_center_specific"
    policy_types:
      - "regulation"
    language: "en"
    notes: |
      Wave 2 (us-local.md #8). Board of Supervisors adopted a modernized
      zoning ordinance (Dec 10 2025) that, for the first time, formally
      defines "Data Center" as a land use and restricts it to IND-2/IND-3
      (general/heavy industrial) districts; land not so zoned needs full
      rezoning. Maricopa County (Phoenix metro) is a top-3 US DC market —
      this is the county's first-ever formal DC zoning definition. Append
      to config/domains/us/arizona.yaml. verified: yes — WebFetch
      confirmed both URLs; news flash explicitly states the ordinance
      "clarifies and expands definitions, including for... Data Centers."

