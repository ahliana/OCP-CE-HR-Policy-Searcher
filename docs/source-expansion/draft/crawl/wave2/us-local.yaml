      Wave 2 (us-local.md #3). Dedicated city microsite covering the
      Technology Manufacturing District (Codified Ordinances Sec.1154) and
      General Employment district (Sec.1153) zoning permitting data
      centers in the 12,000-acre New Albany International Business Park
      (Franklin/Licking counties). Documents architectural/design
      standards, mechanical-equipment screening, noise caps, water/
      wastewater and air-quality requirements. New Albany/Licking County
