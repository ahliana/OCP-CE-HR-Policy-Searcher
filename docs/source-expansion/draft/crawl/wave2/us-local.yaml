      - "report"
    language: "en"
    notes: |
      Wave 2 (us-local.md #7). Documents the 2023-2024 Data Centers
      Workgroup (11 members) that produced a Critical Digital
      Infrastructure Overlay Zone limiting DCs to ~2,600 acres (0.6% of
      the county, around the Eastalco site), plus a Jul 2026 executive-
      order pause on new applications pending the state Data Center Impact
      Analysis, tied to Maryland's new PSC large-load customer registry
      (Utility RELIEF Act). Maryland is emerging as a 2nd major East
      Coast battleground (Prince George's, Frederick, Washington County);
      this has the most fully documented workgroup-to-ordinance pipeline
      of the three. Older /9122/Data-Centers path 404s — use the two paths
      above. Append to config/domains/us/maryland.yaml. verified: yes —
      WebFetch confirmed both URLs live, describing the workgroup mandate
      and the Jul 2026 pause.

