      - "mandates"
      - "efficiency"
      - "data_center_specific"
    policy_types:
      - "regulation"
      - "report"
    language: "en"
    notes: |
      Wave 2 (us-local.md #5). Zoning ordinance amendment adopted Sept 10
      2024 (effective Sept 11 2024) — requires a "future energy needs"
      assessment at special-exception application, proposed
      LEED-Silver/on-site-solar/off-site-renewable-investment energy
      standards, a 200-ft residential setback, fully-enclosed cooling/
      generator equipment, a noise study. Direct neighbor of the already-
      drafted Loudoun/Prince William entries in the densest DC corridor in
      the world; unlike most peer counties this one explicitly proposes
      energy-efficiency (LEED/on-site renewables) conditions, closest fit
      to the efficiency/PUE taxonomy of the VA county tier. Append to
      config/domains/us/virginia.yaml. verified: yes — WebFetch confirmed
      official page with working links to adopted ordinance PDF, staff
      report, research report.

