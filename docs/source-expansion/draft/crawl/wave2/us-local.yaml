      Wave 2 (us-local.md #4). Document repository (21 linked files) for
      the TRIC development agreement — I-2 Heavy Industrial zoning
      (adopted 1999), infrastructure plans, design guidelines, CC&Rs
      governing the industrial park hosting Switch/Google/Microsoft data
      centers plus Tesla's Gigafactory. TRIC is the largest industrial park
