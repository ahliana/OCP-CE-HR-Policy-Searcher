    category: "regulatory"
    tags:
      - "planning"
      - "mandates"
      - "data_center_specific"
    policy_types:
      - "regulation"
    language: "en"
    notes: |
      Wave 2 (us-local.md #2). Adopted ordinance (~Feb 18, 2026) creating
      zoning standards for data centers on unincorporated county land:
      setbacks, noise limits, traffic/road-impact review, and — for large
      projects — a mandatory water study (cooling method + efficiency
      measures), water-use agreement, community-benefit agreement.
      Secondary press additionally describes quarterly energy/on-site-
      generation reporting to the Iowa Utilities Commission incl.
      waste-heat reuse — not independently confirmed on the county's own
      page, treat that specific claim as needing the linked ordinance PDF.
      One of the most detailed county-level DC ordinances found in the
      whole wave-2 scan. Append to config/domains/us/iowa.yaml. verified:
      yes — WebFetch confirmed official page (last updated Mar 4 2026)
      with working links to ordinance PDF and staff report.

