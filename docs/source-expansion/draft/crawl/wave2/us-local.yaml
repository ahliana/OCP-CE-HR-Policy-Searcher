      - "regulation"
    language: "en"
    notes: |
      Wave 2 (us-local.md #10). Council Resolution CR-16-2025 established
      a 19-member task force (county government, utilities, labor,
      business, environmental-justice, academic reps) to study energy
      demand/ratepayer impact, air/water/woodland effects, and quality-of-
      life impacts of "Qualified Data Center" siting; final report Nov 2025
      with rezoning recommendations. Prince George's passed a full
      two-year moratorium on new DC development in 2026 after this task
      force's report — among the strongest local-government responses in
      the entire wave. NOTE: domain is pgccouncil.us (council/legislative
      branch), NOT princegeorgescountymd.gov (executive branch, which
      403'd on the guessed URL — see us-local.md Unverified section).
      Append to config/domains/us/maryland.yaml alongside
      us_frederick_county_md. verified: yes — WebFetch confirmed official
      page with working links to the final report and resolution PDFs.

