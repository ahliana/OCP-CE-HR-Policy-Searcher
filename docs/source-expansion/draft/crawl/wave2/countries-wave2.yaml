# source file produced 0 tier-a and 0 tier-c candidates; 39 verified).
# Source: docs/source-expansion/regions-wave2/countries-wave2.md
# Every entry below is `enabled: false`.
#
# Region-mapping note: VALID_REGIONS (src/core/config.py) has no bucket for
# Central Asia or the Caucasus. Per the task's "map to closest allowed + flag"
# instruction: Central Asia (Kazakhstan, Uzbekistan) is mapped here to "apac"
# (closest broad Asian bucket); Caucasus (Azerbaijan, Georgia, Armenia) is
# mapped to "europe" (Council-of-Europe-adjacent framing, same logic used for
# Balkan states below). Both are imprecise placeholders — recommend adding
# dedicated "central_asia" and "caucasus" VALID_REGIONS values (see report).
# Country identity is preserved in every id/name/notes regardless.
# Balkans + Moldova use the existing valid ["europe","eu_east"] pairing
# (same convention wave-1's eu-uncovered.yaml used for Serbia/Ukraine).
#
# One new config/domains/<country>.yaml file recommended per country below
# (established one-country-per-file convention, e.g. nigeria.yaml/ghana.yaml).
# =============================================================================

